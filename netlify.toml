[build]  
  command = "npm run build"  
  publish = ".output/public"  
  
[build.environment]  
  NITRO_PRESET = "netlify"  
  NODE_VERSION = "18"  
  
# Netlify Functions 配置  
[functions]  
  directory = ".output/server"  
  
[[redirects]]  
  from = "/*"  
  to = "/.netlify/functions/index"  
  status = 200  
  force = true  
  
[[headers]]  
  for = "/*"  
  [headers.values]  
    X-Frame-Options = "DENY"  
    X-XSS-Protection = "1; mode=block"
