[build]  
  command = "npm run build"  
  publish = ".output/public"  
  
[build.environment]  
  NITRO_PRESET = "netlify"  
  
[[redirects]]  
  from = "/*"  
  to = "/index.html"  
  status = 200  
  
[[headers]]  
  for = "/*"  
  [headers.values]  
    X-Frame-Options = "DENY"  
    X-XSS-Protection = "1; mode=block"
