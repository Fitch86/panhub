[build]  
  command = "npm run build"  
  publish = ".output/public"  
  
[build.environment]  
  NITRO_PRESET = "netlify"  
  NODE_VERSION = "20"  
  
[functions]  
  directory = ".output/server"  
  
[[redirects]]  
  from = "/*"  
  to = "/.netlify/functions/index"  
  status = 200  
  force = true
